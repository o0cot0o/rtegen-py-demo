name: Code Review Trigger
on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 通知飞书
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="$(git log -1 --pretty=%an)"
          MSG="$(git log -1 --pretty=%s)"
          STAT="$(git diff --stat HEAD~1..HEAD | tail -1)"

          TOKEN=$(curl -s -X POST 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal' \
            -H 'Content-Type: application/json' \
            -d "{\"app_id\":\"$FEISHU_APP_ID\",\"app_secret\":\"$FEISHU_APP_SECRET\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tenant_access_token'])")

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "获取 token 失败"
            exit 1
          fi

          BOT_OPEN_ID="ou_c175377cf6031aad8d2bcf579c9c8d8b"

          TEXT="<at user_id=\"${BOT_OPEN_ID}\">柯小康的虾米</at> 📦 代码已推送
              仓库: ${REPO}
              分支: ${BRANCH}
              作者: ${AUTHOR}
              提交: ${MSG}
              变更: ${STAT}"

          CONTENT=$(python3 -c "import json,sys; print(json.dumps({'text': sys.stdin.read()}))" <<< "$TEXT")

          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{\"receive_id\":\"$FEISHU_CHAT_ID\",\"msg_type\":\"text\",\"content\":$CONTENT}"
